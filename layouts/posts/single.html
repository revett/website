{{ define "main" }}
<article>
  <p><a class="back" href="/">&larr; Back</a></p>
  <h1>{{ .Title }}</h1>
  <p class="byline">By Charlie Revett &middot; <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time></p>
  {{ with .Params.cover }}<img class="cover" src="{{ . }}" alt="">{{ end }}
  <div class="prose">{{ .Content }}</div>
</article>
{{ end }}
