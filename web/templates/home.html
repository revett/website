{{define "home"}}
<section class="flex flex-col-reverse gap-8 sm:flex-row sm:items-start sm:justify-between">
  <div class="sm:max-w-sm">
    <h1 class="text-2xl font-bold">{{.Page.Title}}</h1>
    <div class="prose mt-4">{{.Page.Body}}</div>
  </div>
  <img src="{{.Page.Portrait}}" alt="Charlie Revett" class="w-40 shrink-0 rounded-2xl sm:w-44">
</section>

<section class="mt-14">
  <h2 class="text-sm font-semibold uppercase tracking-wider text-soft">Recent Posts</h2>
  <ul class="mt-2 divide-y divide-line">
    {{range .Site.Posts}}
    <li>
      <a href="{{.Slug}}" class="group flex items-center gap-4 py-4">
        <img src="{{thumb .Cover}}" alt="" loading="lazy" class="h-14 w-14 shrink-0 rounded-lg object-cover">
        <span>
          <span class="font-medium group-hover:underline">{{.Title}}</span><br>
          <time datetime="{{iso .Date}}" class="text-sm text-soft">{{date .Date}}</time>
        </span>
      </a>
    </li>
    {{end}}
  </ul>
</section>

<section class="mt-14">
  <h2 class="text-sm font-semibold uppercase tracking-wider text-soft">Projects</h2>
  <ul class="mt-4 grid gap-4 sm:grid-cols-2">
    {{range .Page.Projects}}
    <li>
      <a href="{{.URL}}" class="block h-full rounded-xl border border-line p-4 transition-colors hover:bg-card">
        <img src="{{.Image}}" alt="" loading="lazy" class="h-36 w-full rounded-lg object-cover">
        <p class="mt-3 font-medium">{{.Name}}</p>
        <p class="mt-1 text-sm text-soft">{{.Description}}</p>
      </a>
    </li>
    {{end}}
  </ul>
</section>
{{end}}
